<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴월드 EDMS — 전자문서관리시스템</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- mammoth.js: docx를 브라우저 안에서 HTML로 변환 (외부 서버 미경유) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
/* ══════════════════════════════════════
   RESET & BASE
══════════════════════════════════════ */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; font-size: 14px; }
body { background: #EEF0F5; color: #1A202C; min-height: 100vh; }
button { cursor: pointer; border: none; background: none; font-family: inherit; font-size: inherit; }
input, select, textarea { font-family: inherit; font-size: inherit; }

/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root {
  --navy:       #1F3864;
  --navy-dk:    #152843;
  --navy-lt:    #2C4F8C;
  --surface:    #FFFFFF;
  --bg:         #EEF0F5;
  --border:     #E2E8F0;
  --text:       #1A202C;
  --muted:      #718096;
  --sidebar-w:  228px;
  --topbar-h:   52px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08);

  /* 보안등급 ① 고대비 컬러 (P4 경고 강조) */
  --p1-bg: #E8F5E9; --p1-fg: #1B5E20;
  --p2-bg: #E3F2FD; --p2-fg: #0D47A1;
  --p3-bg: #FFF3E0; --p3-fg: #BF360C;
  --p4-bg: #FFCDD2; --p4-fg: #B71C1C;

  /* 상태 */
  --active-bg:   #E8F5E9; --active-fg:   #1B5E20;
  --obsolete-bg: #FFEBEE; --obsolete-fg: #B71C1C;
  --archive-bg:  #ECEFF1; --archive-fg:  #546E7A;

  /* 버전 단계 */
  --dev-bg:  #E3F2FD; --dev-fg:  #0D47A1;
  --dft-bg:  #FFFDE7; --dft-fg:  #F57F17;
  --rel-bg:  #E8F5E9; --rel-fg:  #1B5E20;
  --obs-bg:  #F5F5F5; --obs-fg:  #9E9E9E;
}

/* ══════════════════════════════════════
   APP SHELL LAYOUT
══════════════════════════════════════ */
#app { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  z-index: 20;
}
.sb-logo {
  padding: 20px 18px 16px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sb-logo-name { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.3; }
.sb-logo-sub  { color: rgba(255,255,255,.45); font-size: 10px; margin-top: 3px; letter-spacing: .06em; }

.nav-group { padding: 10px 0 4px; }
.nav-section-label {
  padding: 6px 18px 4px;
  color: rgba(255,255,255,.3);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 18px;
  color: rgba(255,255,255,.65);
  font-size: 13px;
  cursor: pointer;
  transition: background .14s, color .14s;
  user-select: none;
}
.nav-item:hover  { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: rgba(255,255,255,.15); color: #fff; font-weight: 600; }
.nav-icon        { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

.sb-footer {
  margin-top: auto;
  padding: 14px 18px;
  border-top: 1px solid rgba(255,255,255,.1);
}
.user-chip { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: rgba(255,255,255,.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; color: #fff; }
.user-role { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 1px; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* Topbar */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }
.topbar-right  { display: flex; align-items: center; gap: 10px; }

/* Content */
.content { padding: 24px; flex: 1; }

/* ══════════════════════════════════════
   COMPONENTS
══════════════════════════════════════ */

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-sm);
}
.card-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title { font-size: 14px; font-weight: 700; color: var(--text); }
.card-body  { padding: 20px; }

/* Stat cards */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px 20px;
  box-shadow: var(--shadow-sm);
}
.stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: .04em; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
.stat-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: filter .14s, transform .08s;
  border: 1px solid transparent;
  white-space: nowrap;
}
.btn:active        { transform: scale(.97); }
.btn-primary       { background: var(--navy); color: #fff; border-color: var(--navy); }
.btn-primary:hover { filter: brightness(1.12); }
.btn-outline       { background: #fff; color: var(--navy); border-color: var(--border); }
.btn-outline:hover { border-color: var(--navy-lt); background: #F5F8FF; }
.btn-danger        { background: #FFEBEE; color: #B71C1C; border-color: #FFCDD2; }
.btn-danger:hover  { background: #FFCDD2; }
.btn-ghost         { background: transparent; color: var(--muted); border-color: transparent; }
.btn-ghost:hover   { background: var(--bg); color: var(--text); }
.btn-sm            { padding: 4px 10px; font-size: 12px; }
.btn-full          { width: 100%; justify-content: center; }
.btn:disabled      { opacity: .55; cursor: not-allowed; transform: none; }

/* Forms */
.form-group   { margin-bottom: 16px; }
.form-label   {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: .05em;
  text-transform: uppercase;
}
.required     { color: #E53935; margin-left: 2px; }
.form-control {
  width: 100%;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--text);
  background: #fff;
  transition: border-color .14s, box-shadow .14s;
  outline: none;
}
.form-control:focus {
  border-color: var(--navy-lt);
  box-shadow: 0 0 0 3px rgba(44,79,140,.12);
}
.form-control::placeholder { color: #B0BEC5; }
select.form-control { cursor: pointer; }
.form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Table */
.tbl-wrap { overflow-x: auto; }
.tbl      { width: 100%; border-collapse: collapse; }
.tbl th {
  background: #F7F9FF;
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  letter-spacing: .06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.tbl td {
  padding: 11px 14px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.row-link      { cursor: pointer; }
.tbl tr.row-link:hover td { background: #F5F8FF; }

/* Badges */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .02em;
  white-space: nowrap;
}
.bp1 { background: var(--p1-bg); color: var(--p1-fg); }
.bp2 { background: var(--p2-bg); color: var(--p2-fg); }
.bp3 { background: var(--p3-bg); color: var(--p3-fg); }
.bp4 { background: var(--p4-bg); color: var(--p4-fg); border: 1px solid #EF9A9A; }

.b-active   { background: var(--active-bg);   color: var(--active-fg); }
.b-obsolete { background: var(--obsolete-bg); color: var(--obsolete-fg); }
.b-archived { background: var(--archive-bg);  color: var(--archive-fg); }

.b-dev { background: var(--dev-bg); color: var(--dev-fg); }
.b-dft { background: var(--dft-bg); color: var(--dft-fg); }
.b-rel { background: var(--rel-bg); color: var(--rel-fg); }
.b-obs { background: var(--obs-bg); color: var(--obs-fg); }

/* Security badge in topbar */
.sec-topbar { padding: 4px 12px; border-radius: 99px; font-size: 11px; font-weight: 700; }

/* Filter bar */
.filter-bar {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-bar input,
.filter-bar select {
  height: 34px;
  padding: 0 10px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  background: #fff;
  outline: none;
}
.filter-bar input:focus,
.filter-bar select:focus { border-color: var(--navy-lt); }
.filter-bar input  { min-width: 220px; }
.filter-bar select { min-width: 130px; cursor: pointer; }

/* KV Grid */
.kv { display: grid; grid-template-columns: 110px 1fr; row-gap: 6px; }
.kv-k { font-size: 11px; font-weight: 700; color: var(--muted); padding: 4px 0; letter-spacing: .03em; }
.kv-v { font-size: 13px; color: var(--text); padding: 4px 0; word-break: break-all; }

/* Series chip */
.series-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  background: #EEF2FF;
  color: #3949AB;
  letter-spacing: .02em;
}

/* Divider */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* Section header */
.sec-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.sec-title { font-size: 15px; font-weight: 700; color: var(--text); }

/* Dropzone */
.dropzone {
  border: 2px dashed var(--border);
  border-radius: 8px;
  padding: 28px;
  text-align: center;
  cursor: pointer;
  transition: border-color .14s, background .14s;
}
.dropzone:hover,
.dropzone.drag-over {
  border-color: var(--navy-lt);
  background: #F0F4FF;
}
.dropzone-icon  { font-size: 28px; margin-bottom: 8px; opacity: .6; }
.dropzone-text  { font-size: 13px; color: var(--muted); }
.dropzone-text strong { color: var(--navy); }
#r-file-input,
#v-file-input { display: none; }

/* File preview */
.file-preview {
  margin-top: 8px;
  padding: 8px 12px;
  background: #F7F9FF;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 12px;
  color: var(--navy);
  display: none;
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.45);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.modal {
  background: #fff;
  border-radius: 10px;
  width: 580px;
  max-width: 96vw;
  box-shadow: 0 24px 64px rgba(0,0,0,.2);
  max-height: 92vh;
  overflow-y: auto;
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; background: #fff; z-index: 1;
}
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 5px;
  background: #f5f5f5;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--muted);
}
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body   { padding: 20px; }
.modal-footer {
  padding: 14px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--muted);
}
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .35; }
.empty-text { font-size: 13px; }

/* Misc */
.mt-16  { margin-top: 16px; }
.mt-20  { margin-top: 20px; }
.text-sm   { font-size: 12px; }
.text-muted { color: var(--muted); }
code { font-family: 'Consolas', monospace; font-size: .92em; }

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(150deg, var(--navy-dk) 0%, #1a3a7a 60%, #223d87 100%);
}
.login-wrap {
  width: 400px;
  max-width: 96vw;
}
.login-card {
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,.32);
}
.login-head {
  background: var(--navy);
  padding: 36px 40px 28px;
  text-align: center;
}
.login-emblem {
  width: 48px; height: 48px;
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin: 0 auto 14px;
}
.login-company { color: rgba(255,255,255,.6); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; }
.login-sys     { color: #fff; font-size: 20px; font-weight: 700; margin-top: 4px; }
.login-sub     { color: rgba(255,255,255,.4); font-size: 11px; margin-top: 4px; }
.login-body    { padding: 32px 40px 36px; }
.login-field   { margin-bottom: 18px; }
.login-label   {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: .07em;
  text-transform: uppercase;
}
/* ① autocomplete="new-password" 는 HTML 속성으로 처리,
      CSS 강제 차단도 병행 */
.login-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 7px;
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .14s, box-shadow .14s;
  background: #fff;
}
.login-input:focus {
  border-color: var(--navy-lt);
  box-shadow: 0 0 0 3px rgba(44,79,140,.14);
}
.login-input::placeholder { color: #C5CDD8; }

/* ── 비밀번호 표시 버튼 ─────────────────────────────────
   .pw-wrap  : 입력창과 버튼을 함께 묶는 감싸개(wrapper)
   .pw-toggle: 눈 모양 버튼 — 마우스를 올리면 비밀번호 표시 */
.pw-wrap { position: relative; }
.pw-wrap .login-input { padding-right: 50px; }
.pw-toggle {
  position: absolute;        /* 입력창 위에 겹쳐서 배치 */
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 28px;
  border: 1.5px solid var(--border);
  border-radius: 6px;
  background: #F8FAFB;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color .14s, color .14s, background .14s, box-shadow .14s;
  user-select: none;
  flex-shrink: 0;
}
/* 마우스가 버튼 위에 올라왔을 때 스타일 */
.pw-toggle:hover {
  border-color: var(--navy-lt);
  color: var(--navy);
  background: #EEF3FF;
  box-shadow: 0 0 0 3px rgba(44,79,140,.1);
}
.pw-toggle svg { pointer-events: none; }  /* SVG 자체는 마우스 이벤트 무시 */

/* ── 이메일 기억하기 체크박스 ───────────────────────────── */
.remember-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 14px 0 18px;
}
.remember-check {
  width: 16px;
  height: 16px;
  accent-color: var(--navy);  /* 체크 시 네이비 색상 */
  cursor: pointer;
  flex-shrink: 0;
}
.remember-label {
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}

/* ── 오류 메시지 (원인 안내 포함) ──────────────────────── */
.login-error {
  margin-top: 14px;
  padding: 12px 14px;
  background: #FFEBEE;
  border: 1px solid #FFCDD2;
  border-radius: 6px;
  font-size: 12px;
  color: #B71C1C;
  line-height: 1.6;
}
.login-error-title  { font-weight: 700; margin-bottom: 4px; display: block; }
.login-error-hint   {
  color: #4527A0;
  background: #EDE7F6;
  border: 1px solid #B39DDB;
  border-radius: 4px;
  padding: 7px 10px;
  margin-top: 8px;
  font-size: 11px;
  line-height: 1.7;
}

.login-btn {
  width: 100%;
  margin-top: 6px;
  padding: 12px;
  border-radius: 7px;
  background: var(--navy);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: filter .14s;
}
.login-btn:hover    { filter: brightness(1.12); }
.login-btn:disabled { opacity: .55; cursor: not-allowed; filter: none; }
.login-error {
  margin-top: 14px;
  padding: 10px 14px;
  background: #FFEBEE;
  border: 1px solid #FFCDD2;
  border-radius: 6px;
  font-size: 12px;
  color: #B71C1C;
}
.login-notice {
  margin-top: 16px;
  text-align: center;
  font-size: 11px;
  color: #C5CDD8;
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast-item {
  background: #1A202C;
  color: #fff;
  padding: 10px 16px;
  border-radius: 8px;
  font-size: 13px;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  animation: toastIn .2s ease;
  max-width: 300px;
}
.toast-success { background: #1B5E20; }
.toast-error   { background: #B71C1C; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══════════════════════════════════════
   LOADING SKELETON
══════════════════════════════════════ */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
  display: inline-block;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ══════════════════════════════════════
   2-COLUMN GRID
══════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-2-rev { display: grid; grid-template-columns: 1fr 320px; gap: 20px; align-items: start; }

/* ══════════════════════════════════════
   인쇄 차단 — P3/P4 문서 보안
══════════════════════════════════════ */
@media print {
  * { visibility: hidden !important; }
  body::before {

<script>

/* 네비게이션 구조 */

const DOC_TYPES = [

/* ╔══════════════════════════════════════════════════════════╗

/*

const S = {

  profile: null,          // user_profiles 행 — ② 항상 보장
  view:    'dashboard',
  params:  {},

  docs:     [],

/* ╔══════════════════════════════════════════════════════════╗
   ║  LAYER 3 · SUPABASE OPERATIONS                          ║
   ╚══════════════════════════════════════════════════════════╝ */

/* ── 인증 ───────────────────────────────────────────────── */
async function signIn(email, pw) {
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) throw error;
  return data;
}

async function doSignOut() {
  await sb.auth.signOut();
  S.user = null; S.profile = null;
  renderLogin();
}

/* ── 프로필 로드 (② 핵심: 렌더링 전 반드시 완료) ─────── */
async function loadProfile(uid) {
  const { data, error } = await sb
    .from('user_profiles')
    .select('*')
    .eq('id', uid)
    .single();
  if (error) throw error;
  S.profile = data;     /* 이후 모든 renderXxx() 에서 S.profile 안전 접근 */
}

/* ── 문서 목록 ──────────────────────────────────────────── */
async function loadDocuments() {
  /* current_version_id → document_versions 조인으로 버전·단계 함께 조회 */
  let q = sb.from('documents').select(`
    id, doc_number, doc_name, doc_type, series_id,
    security_level, status, updated_at,
    cur_ver:document_versions!fk_current_version(
      version_string, version_stage
    )
  `);
  const f = S.filters;
  if (f.series)   q = q.eq('series_id', f.series);
  if (f.security) q = q.eq('security_level', parseInt(f.security));
  if (f.status)   q = q.eq('status', f.status);
  if (f.search) {
    q = q.or(`doc_number.ilike.%${f.search}%,doc_name.ilike.%${f.search}%`);
  }
  q = q.order('updated_at', { ascending: false }).limit(300);
  const { data, error } = await q;
  if (error) {
    /* JOIN 실패 시 버전 없이 기본 조회로 fallback */
    const { data: d2 } = await sb.from('documents').select('*')
      .order('updated_at', { ascending: false }).limit(300);
    S.docs = d2 || [];
  } else {
    S.docs = data || [];
  }
}

/* ── 문서 상세 + 버전 이력 ─────────────────────────────── */
async function loadDocDetail(docId) {
  const [docRes, verRes] = await Promise.all([
    sb.from('documents').select('*').eq('id', docId).single(),
    sb.from('document_versions')
      .select('*')
      .eq('document_id', docId)
      .order('created_at', { ascending: false }),
  ]);
  if (docRes.error) throw docRes.error;
  S.selDoc  = docRes.data;
  S.selVers = verRes.data || [];
}

/* ── 통계 ────────────────────────────────────────────────── */
async function loadStats() {
  const firstOfMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString();
  const [r1, r2, r3, r4] = await Promise.all([
    sb.from('documents').select('id', { count: 'exact', head: true }),
    sb.from('documents').select('id', { count: 'exact', head: true }).eq('status', 'active'),
    sb.from('documents').select('id', { count: 'exact', head: true }).gte('created_at', firstOfMonth),
    sb.from('approval_requests').select('id', { count: 'exact', head: true }).eq('status', 'pending'),
  ]);
  S.stats = {
    total:   r1.count || 0,
    active:  r2.count || 0,
    monthly: r3.count || 0,
    pending: r4.count || 0,
  };
}

/* ── 시리즈 목록 ────────────────────────────────────────── */
/* 코드 안에 5종을 고정 값으로 보유 — DB 조회 실패 시 자동 사용 */
const SERIES_FALLBACK = [
  { id: 'CFSPS', name_ko: 'CFSPS 표준' },
  { id: 'QEMS',  name_ko: 'QEMS 경영시스템' },
  { id: 'PLAN',  name_ko: '계획문서' },
  { id: 'NT',    name_ko: 'NT문서' },
  { id: 'CES',   name_ko: 'CES문서' },
];

async function loadSeries() {
  try {
    const { data, error } = await sb.from('document_series').select('*').order('id');
    /* DB에서 정상적으로 가져오면 사용, 비어있거나 오류면 고정값 사용 */
    S.series = (data && data.length > 0) ? data : SERIES_FALLBACK;
  } catch(e) {
    S.series = SERIES_FALLBACK;
  }
}

/* ── 결재 목록 (내 처리 필요 단계) ────────────────────── */
async function loadApprovals() {
  const { data, error } = await sb
    .from('approval_steps')
    .select(`
      id, step_order, step_name, status, created_at,
      approval_requests (
        id, status, created_at,
        document_versions (
          version_string,
          documents ( doc_number, doc_name, security_level )
        )
      )
    `)
    .eq('assignee_id', S.user.id)
    .eq('status', 'pending')
    .order('created_at');
  if (error) throw error;
  S.approvals = data || [];
}

/* ── 접근 로그 ──────────────────────────────────────────── */
async function loadLogs() {
  const isMgr = S.profile && ['대표이사','품질팀장'].includes(S.profile.role);
  let q = sb.from('access_logs')
    .select(`
      id, action, ip_address, created_at,
      documents ( doc_number, doc_name ),
      user_profiles ( name )
    `)
    .order('created_at', { ascending: false })
    .limit(100);
  if (!isMgr) q = q.eq('user_id', S.user.id);
  const { data, error } = await q;
  if (error) throw error;
  S.logs = data || [];
}

/* ── 접근 로그 기록 ─────────────────────────────────────── */
function recordLog(docId, verId, action) {
  if (!S.user) return;
  sb.from('access_logs').insert({
    user_id: S.user.id,
    document_id: docId || null,
    version_id: verId || null,
    action,
  }).then();  /* fire-and-forget */
}

/* ── Storage 업로드 ─────────────────────────────────────── */
async function uploadFile(file, secLvl, docNum, verStr) {
  const folder  = `P${secLvl}`;
  const ext     = file.name.split('.').pop().toLowerCase();

  /* Storage 경로: 영문·숫자·하이픈·점만 허용
     한글·특수문자 → 언더스코어(_)로 치환
     예) CFSPS-1장 → CFSPS-1_  /  Rev 1.00 → Rev_1_00  */
  const safeNum = docNum.replace(/[^a-zA-Z0-9\-]/g, '_');
  const safeVer = verStr.replace(/[^a-zA-Z0-9\-\.]/g, '_');
  const path    = `${folder}/${safeNum}_${safeVer}_${Date.now()}.${ext}`;

  const { error } = await sb.storage
    .from('documents').upload(path, file, { upsert: true });
  if (error) throw error;
  return path;
}

/* ── 버전 테이블 파일 버튼 생성 헬퍼 ──────────────────────
   중첩 템플릿 리터럴 오류 방지를 위해 별도 함수로 분리     */
function versionFileBtns(v, doc) {
  if (!v.file_path) return '<span class="text-muted text-sm">파일 없음</span>';

  const ext        = (v.file_name || '').split('.').pop().toLowerCase();
  const canPreview = ['docx', 'pdf'].includes(ext);
  const safeName   = (v.file_name || '').replace(/'/g, "\\'");
  const safeTitle  = (doc.doc_number + ' ' + doc.doc_name).replace(/'/g, "\\'");

  let html = '<div style="display:flex;gap:6px;flex-wrap:wrap">';

  if (canPreview) {
    html += '<button class="btn btn-primary btn-sm" ' +
      'onclick="openPreview(\'' + v.file_path + '\',\'' + safeName + '\',\'' +
      safeTitle + '\',' + doc.security_level + ')">' +
      '👁 미리보기</button>';
  }

  html += '<button class="btn btn-outline btn-sm" ' +
    'onclick="downloadVersion(\'' + v.file_path + '\',\'' + safeName + '\',\'' +
    doc.id + '\',\'' + v.id + '\')">' +
    '⬇ 다운로드</button>';

  html += '</div>';
  return html;
}

/* ── 뷰어 열기 ───────────────────────────────────────────── */
/* ── 문서 뷰어 (mammoth.js 기반, 워터마크 + 인쇄 차단) ────
   docx → mammoth.js로 브라우저 내부에서 HTML 변환
   PDF  → 브라우저 내장 뷰어 (iframe + blob URL)
   외부 서버 미경유 — 파일이 브라우저 메모리 안에서만 처리
──────────────────────────────────────────────────────── */

/* 워터마크 SVG 생성 — 사용자 정보 자동 삽입 */
function buildWatermark() {
  const p   = S.profile;
  const now = new Date().toLocaleString('ko-KR', {
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit'
  });
  const lines = [
    `${p?.name || '?'}  ${p?.role || ''}`,
    `열람일시: ${now}`,
    `주식회사 뉴월드 — 무단배포·출력 금지`,
  ];
  const svgLines = lines.map((txt, i) =>
    `<text x="50%" y="${38 + i * 22}"
       font-family="맑은 고딕,sans-serif" font-size="13"
       fill="rgba(176,0,0,0.38)" text-anchor="middle">${txt}</text>`
  ).join('');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="460" height="220">
    <g transform="rotate(-32 230 110)">${svgLines}</g></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
}

/* 뷰어 열기 */
async function openPreview(filePath, fileName, docTitle, secLevel) {
  const secCfg = SEC[secLevel] || SEC[2];
  const ext    = (fileName || '').split('.').pop().toLowerCase();

  /* 뷰어 레이어 생성 */
  const viewer = document.createElement('div');
  viewer.id    = 'doc-viewer-overlay';
  viewer.className = 'doc-viewer';
  viewer.innerHTML = `
    <div class="doc-viewer-bar">
      <div class="doc-viewer-bar-left">
        <span class="doc-viewer-bar-title">📄 ${docTitle}</span>
        <span class="badge ${secCfg.cls}">${secCfg.label}</span>
      </div>
      <div class="doc-viewer-bar-right">
        <span style="color:rgba(255,255,255,.5);font-size:11px">
          열람자: ${S.profile?.name || '-'} ·
          ${new Date().toLocaleString('ko-KR')}
        </span>
        <button class="doc-viewer-close" onclick="closePreview()">✕ 닫기</button>
      </div>
    </div>
    <div class="doc-viewer-notice">
      🔒 보안등급 ${secCfg.label} —
      무단 배포·출력·스크린샷은 보안 정책 위반입니다
    </div>
    <div class="doc-viewer-scroll">
      <div class="doc-paper" id="dv-paper">
        <div style="text-align:center;padding:80px 0;color:var(--muted)">
          <div style="font-size:28px;margin-bottom:12px">⏳</div>
          문서를 불러오는 중입니다…
        </div>
      </div>
    </div>`;
  document.body.appendChild(viewer);

  /* 워터마크 레이어 (뷰어 위 고정) */
  const wm = document.createElement('div');
  wm.className = 'doc-watermark';
  wm.style.backgroundImage  = buildWatermark();
  wm.style.backgroundRepeat = 'repeat';
  document.body.appendChild(wm);

  /* 파일 로드 및 렌더링 */
  try {
    const { data, error } = await sb.storage
      .from('documents').createSignedUrl(filePath, 300);
    if (error) throw error;

    const resp  = await fetch(data.signedUrl);
    const paper = document.getElementById('dv-paper');
    if (!paper) return;

    if (ext === 'pdf') {
      /* PDF: blob URL → iframe */
      const blob    = await resp.blob();
      const blobUrl = URL.createObjectURL(blob);
      paper.innerHTML = `<iframe src="${blobUrl}" width="100%"
        height="1000px" style="border:none" title="${docTitle}"></iframe>`;

    } else if (ext === 'docx') {
      /* DOCX: mammoth.js 변환 */
      const buf    = await resp.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer: buf });
      paper.innerHTML = result.value ||
        '<p style="color:var(--muted);text-align:center;padding:60px 0">내용을 표시할 수 없습니다.</p>';

    } else {
      paper.innerHTML =
        `<p style="color:var(--muted);text-align:center;padding:60px 0">
          .${ext} 형식은 미리보기를 지원하지 않습니다.<br>
          다운로드 후 열어주세요.
        </p>`;
    }
  } catch(e) {
    const paper = document.getElementById('dv-paper');
    if (paper) paper.innerHTML =
      `<p style="color:#B71C1C;text-align:center;padding:60px 0">
        로드 실패: ${e.message}
      </p>`;
  }
}

/* 뷰어 닫기 */
function closePreview() {
  document.getElementById('doc-viewer-overlay')?.remove();
  document.querySelector('.doc-watermark')?.remove();
}

/* ── Storage 서명 URL 생성 + 다운로드 ─────────────────── */
async function downloadVersion(filePath, fileName, docId, verId) {
  if (!filePath) { toast('저장된 파일이 없습니다.', 'error'); return; }
  const { data, error } = await sb.storage.from('documents').createSignedUrl(filePath, 120);
  if (error) { toast('다운로드 링크 생성 실패: ' + error.message, 'error'); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl;
  a.download = fileName || 'document';
  a.click();
  recordLog(docId, verId, 'download');
}

/* ── 결재 단계 처리 ─────────────────────────────────────── */
async function processApprovalStep(stepId, decision) {
  let comment = null;
  if (decision === 'rejected') {
    comment = prompt('반려 사유를 입력하세요:');
    if (comment === null) return;
  }
  try {
    await sb.from('approval_steps').update({
      status: decision,
      comment: comment || null,
      acted_at: new Date().toISOString(),
    }).eq('id', stepId);
    toast(decision === 'approved' ? '✅ 승인 처리 완료' : '❌ 반려 처리 완료', 'success');
    await loadApprovals();
    renderView();
  } catch(e) {
    toast('처리 실패: ' + e.message, 'error');
  }
}

              <input
                id="li-pw" type="password"
                class="login-input"
                placeholder="••••••••"
                autocomplete="new-password"
              >
              <!--
                비밀번호 확인 버튼
                · onmouseenter : 마우스가 버튼 위에 올라오면 → type을 text로 바꿔 비밀번호를 보여줌
                · onmouseleave : 마우스가 버튼에서 벗어나면  → type을 password로 되돌려 숨김
                · title        : 마우스를 버튼에 잠깐 멈추면 뜨는 안내 문구
              -->
              <button
                type="button"
                class="pw-toggle"
                title="마우스를 올리는 동안 비밀번호가 표시됩니다"
                aria-label="비밀번호 확인"
                onmouseenter="document.getElementById('li-pw').type='text'"
                onmouseleave="document.getElementById('li-pw').type='password'"
              >
                <!-- 눈(eye) 모양 SVG 아이콘 -->
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>
          <!-- 이메일 기억하기 체크박스
               체크하면 이 컴퓨터에 이메일 주소를 저장해 두었다가
               다음 접속 시 자동으로 입력해 줍니다 -->
          <div class="remember-row">
            <input type="checkbox" id="li-remember" class="remember-check">
            <label for="li-remember" class="remember-label">이메일 기억하기</label>
          </div>
          <button class="login-btn" id="li-btn">로그인</button>
          <!-- 오류 메시지 영역: 로그인 실패 시 원인과 해결 방법을 함께 안내 -->
          <div id="li-err" style="display:none" class="login-error"></div>
          <div class="login-notice">접근 기록은 감사 목적으로 자동 저장됩니다.</div>
        </div>
      </div>
    </div>
  </div>`;

  const emailEl    = document.getElementById('li-email');
  const pwEl       = document.getElementById('li-pw');
  const btnEl      = document.getElementById('li-btn');
  const errEl      = document.getElementById('li-err');
  const rememberEl = document.getElementById('li-remember');

  /* ── 저장된 이메일 불러오기 ──────────────────────────────
     localStorage : 이 컴퓨터(브라우저)에만 저장되는 작은 메모장
     이전에 "이메일 기억하기"를 체크했다면 여기서 꺼내서 입력창에 채웁니다 */
  const savedEmail = localStorage.getItem('edms_remember_email');
  if (savedEmail) {
    emailEl.value      = savedEmail;
    rememberEl.checked = true;
  }

  /* ── 오류 메시지 표시 함수 ──────────────────────────────
     단순 텍스트 대신 HTML을 넣어 원인과 해결 방법을 함께 안내합니다 */
  const showErr = (title, hint = '') => {
    errEl.innerHTML = `
      <span class="login-error-title">⚠️ ${title}</span>
      ${hint ? `<div class="login-error-hint">${hint}</div>` : ''}`;
    errEl.style.display = 'block';
  };

  /* ── 로그인 실행 함수 ──────────────────────────────────── */
  const doLogin = async () => {
    const email = emailEl.value.trim();
    const pw    = pwEl.value;

    if (!email || !pw) {
      showErr('이메일과 비밀번호를 모두 입력해 주세요.');
      return;
    }

    btnEl.disabled = true; btnEl.textContent = '로그인 중…';

    try {
      const result = await signIn(email, pw);  /* signIn이 { user, session } 을 반환 */
      S.user = result.user;

      /* 이메일 기억하기 처리
         · 체크된 경우  → localStorage 에 이메일 저장
         · 체크 해제 시 → 저장된 이메일 삭제 */
      if (rememberEl.checked) {
        localStorage.setItem('edms_remember_email', email);
      } else {
        localStorage.removeItem('edms_remember_email');
      }

      /* ② 프로필 먼저 로드 완료 → 나머지 병렬 → 화면 렌더링 */
      await loadProfile(S.user.id);
      await Promise.all([ loadStats(), loadSeries(), loadDocuments() ]);
      renderApp();

    } catch(e) {
      /* ── 오류 종류별 안내 메시지 ──────────────────────────
         오류 메시지 원문(영어)을 보고 원인을 파악해서 한국어로 안내합니다 */
      let title, hint;

      if (e.message?.includes('Invalid login credentials')) {
        /* 가장 흔한 경우: 이메일·비밀번호 불일치 또는 계정 미생성 */
        title = '이메일 또는 비밀번호가 올바르지 않습니다.';
        hint  = `아래 순서로 확인해 주세요.<br>
                 1️⃣ 이메일 주소에 오타가 없는지 확인<br>
                 2️⃣ Supabase 대시보드 → Authentication → Users 에서<br>
                 &nbsp;&nbsp;&nbsp;이 이메일로 계정이 생성되어 있는지 확인<br>
                 3️⃣ 계정이 없다면 "Add user" 로 새로 만들어야 합니다`;
      } else if (e.message?.includes('API key') || e.message?.includes('apikey') || e.message?.includes('JWT')) {
        /* SUPABASE_KEY 가 아직 기본값이거나 잘못 입력된 경우 */
        title = '시스템 설정 오류: API 키가 올바르지 않습니다.';
        hint  = `index.html 파일 안의 SUPABASE_KEY 값을 확인해 주세요.<br>
                 Supabase 대시보드 → Settings → API → anon public 키를<br>
                 복사해서 'YOUR_SUPABASE_ANON_KEY' 자리에 붙여넣어야 합니다.`;
      } else if (e.message?.includes('Email not confirmed')) {
        /* 이메일 인증을 아직 하지 않은 경우 */
        title = '이메일 인증이 완료되지 않았습니다.';
        hint  = `Supabase 대시보드 → Authentication → Users 에서<br>
                 해당 계정을 찾아 "Confirm user" 버튼을 클릭하거나,<br>
                 계정 생성 시 "Auto Confirm User" 옵션을 켜 주세요.`;
      } else if (e.message?.toLowerCase().includes('fetch') || e.message?.toLowerCase().includes('network')) {
        /* 인터넷 연결 문제 */
        title = '인터넷 연결을 확인해 주세요.';
        hint  = `네트워크 상태를 확인하거나 잠시 후 다시 시도해 주세요.`;
      } else {
        /* 그 외 예상치 못한 오류: 원문도 함께 표시 */
        title = '로그인 중 오류가 발생했습니다.';
        hint  = `오류 내용: ${e.message || '알 수 없는 오류'}<br>
                 이 내용을 관리자에게 전달해 주세요.`;
      }

      showErr(title, hint);
      btnEl.disabled = false; btnEl.textContent = '로그인';
    }
  };

  btnEl.addEventListener('click', doLogin);
  pwEl.addEventListener('keydown', e => e.key === 'Enter' && doLogin());
}

function buildDocRows() {

  return S.docs.map(d => {

    const verStr   = ver?.version_string || '-';

  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });

    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) {
      const dt = new DataTransfer(); dt.items.add(f); fi.files = dt.files;
      fp.textContent = `📎 ${f.name}`; fp.style.display = 'block';

  });

  document.getElementById('v-submit').addEventListener('click', async () => {
    const version  = document.getElementById('v-ver').value.trim();
    const stage    = document.getElementById('v-stage').value;

    const btn = document.getElementById('v-submit');
    btn.disabled = true; btn.textContent = '업로드 중…';
    try {
      let filePath = null, fileName = null, fileSize = null;
      if (file) {
        filePath = await uploadFile(file, doc.security_level, doc.doc_number, version);
        fileName = file.name; fileSize = file.size;
      }
      const { data: vd, error: ve } = await sb.from('document_versions').insert({
        document_id: doc.id, version_string: version,
        version_stage: stage, revision_content: revision || null,
        file_path: filePath, file_name: fileName,
        file_type: file ? file.name.split('.').pop().toLowerCase() : null,
        file_size: fileSize, created_by: S.user.id,
      }).select().single();
      if (ve) throw ve;
      /* current_version_id 갱신 */
      await sb.from('documents').update({
        current_version_id: vd.id, updated_at: new Date().toISOString()
      }).eq('id', doc.id);
      recordLog(doc.id, vd.id, 'upload');
      toast('✅ 버전 업로드 완료', 'success');
      closeVerModal();
      await loadDocDetail(doc.id);
      renderDocDetail();
    } catch(e) {
      toast('업로드 실패: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '업로드';
    }
  });

  recordLog(doc.id, doc.current_version_id, 'view');
}

/* ── 문서 완전 삭제 ──────────────────────────────────────
   순서: Storage 파일 → 접근로그 → 버전 → 문서
   current_version_id 참조를 먼저 해제 후 삭제합니다.  */
async function deleteDoc(docId) {
  const confirmed = confirm(
    '⚠️ 문서를 완전히 삭제합니다.\n\n' +
    '· 모든 버전 이력이 삭제됩니다.\n' +
    '· 업로드된 파일도 삭제됩니다.\n' +
    '· 이 작업은 되돌릴 수 없습니다.\n\n' +
    '계속하시겠습니까?'
  );
  if (!confirmed) return;

  try {
    /* 1. Storage 파일 삭제 */
    const { data: vers } = await sb.from('document_versions')
      .select('file_path').eq('document_id', docId);
    for (const v of (vers || [])) {
      if (v.file_path) {
        await sb.storage.from('documents').remove([v.file_path]);
      }
    }

    /* 2. current_version_id 참조 해제 */
    await sb.from('documents')
      .update({ current_version_id: null }).eq('id', docId);

    /* 3. 버전 이력 삭제 */
    await sb.from('document_versions').delete().eq('document_id', docId);

    /* 4. 접근 로그 삭제 */
    await sb.from('access_logs').delete().eq('document_id', docId);

    /* 5. 문서 삭제 */
    await sb.from('documents').delete().eq('id', docId);

    toast('🗑 문서가 삭제되었습니다.', 'success');
    S.filters = { series: '', security: '', status: 'active', search: '' };
    await loadDocuments();
    navigate('documents');
  } catch(e) {
    toast('삭제 실패: ' + e.message, 'error');
  }
}

            <div class="dropzone-text"><strong>파일을 여기에 드래그</strong> 하거나 클릭하여 선택</div>

            <div class="dropzone-text text-sm" style="margin-top:6px;color:#3949AB;font-weight:600">
              ✨ QEMS 표준 파일명이면 모든 항목이 자동으로 입력됩니다
            </div>
          </div>
          <input type="file" id="r-file-input" accept=".docx,.xlsx,.pdf">
          <div class="file-preview" id="r-fp"></div>

        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:8px">
          <button class="btn btn-ghost" onclick="navigate('documents')">취소</button>

        </div>

      </div>
    </div>
  </div>`;

  const rfi = document.getElementById('r-file-input');
  const rfp = document.getElementById('r-fp');
  rfi.addEventListener('change', e => {
    const f = e.target.files[0];
    if (f) {
      rfp.textContent = `📎 ${f.name}  (${(f.size/1024).toFixed(0)} KB)`;
      rfp.style.display = 'block';
      applyParsedToRegisterForm(f.name);   /* ✨ 파일명 자동 분석 */
    }
  });

  const rdz = document.getElementById('r-dz');
  rdz.addEventListener('dragover',  e => { e.preventDefault(); rdz.classList.add('drag-over'); });
  rdz.addEventListener('dragleave', () => rdz.classList.remove('drag-over'));
  rdz.addEventListener('drop', e => {
    e.preventDefault(); rdz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f) {
      const dt = new DataTransfer(); dt.items.add(f); rfi.files = dt.files;
      rfp.textContent = `📎 ${f.name}  (${(f.size/1024).toFixed(0)} KB)`;
      rfp.style.display = 'block';
      applyParsedToRegisterForm(f.name);   /* ✨ 파일명 자동 분석 */
    }
  });

  document.getElementById('r-submit').addEventListener('click', async () => {
    const docNum  = document.getElementById('rn').value.trim();
    const docName = document.getElementById('rname').value.trim();
    const nameEn  = document.getElementById('rnamen').value.trim();
    const series  = document.getElementById('rseries').value;
    const docType = document.getElementById('rtype').value;
    const secLvl  = parseInt(document.getElementById('rsec').value);
    const dept    = document.getElementById('rdept').value.trim();
    const parent  = document.getElementById('rparent').value.trim();
    const version = document.getElementById('rver').value.trim();
    const stage   = document.getElementById('rstage').value;
    const file    = rfi.files[0];

    if (!docNum || !docName || !series || !docType || !version) {
      toast('필수 항목(*)을 모두 입력하세요', 'error'); return;
    }

    const btn = document.getElementById('r-submit');
    btn.disabled = true; btn.textContent = '등록 중…';
    let insertedDocId = null;  /* 롤백용 — 문서 ID 저장 */
    try {
      /* 1. 문서 마스터 */
      const { data: d, error: de } = await sb.from('documents').insert({
        doc_number: docNum, doc_name: docName,
        doc_name_en: nameEn || null,
        series_id: series, doc_type: docType,
        security_level: secLvl, status: 'active',
        department: dept || null,
        parent_doc_number: parent || null,
      }).select().single();
      if (de) throw de;
      insertedDocId = d.id;  /* 이후 실패 시 삭제할 ID 저장 */

      /* 2. 파일 업로드 (선택) */
      let filePath = null;
      if (file) filePath = await uploadFile(file, secLvl, docNum, version);

      /* 3. 초기 버전 */
      const { data: v, error: ve } = await sb.from('document_versions').insert({
        document_id: d.id, version_string: version,
        version_stage: stage, file_path: filePath,
        file_name: file?.name || null,
        file_type: file ? file.name.split('.').pop().toLowerCase() : null,
        file_size: file?.size || null,
        created_by: S.user.id,
      }).select().single();
      if (ve) throw ve;

      /* 4. current_version_id 연결 */
      await sb.from('documents').update({ current_version_id: v.id }).eq('id', d.id);
      recordLog(d.id, v.id, 'upload');

      toast('✅ 문서 등록 완료', 'success');
      S.filters = { series: '', security: '', status: 'active', search: '' };
      await loadDocuments();
      navigate('documents');
    } catch(e) {
      /* 실패 시 이미 생성된 문서 레코드 자동 삭제 (롤백) */
      if (insertedDocId) {
        await sb.from('documents').delete().eq('id', insertedDocId).then();
      }
      toast('등록 실패: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '📝 등록';
    }
  });
}

/* ── Toast ──────────────────────────────────────────────── */
function toast(msg, type = '') {
  const wrap = document.getElementById('toast');
  const el   = document.createElement('div');
  el.className = `toast-item${type ? ' toast-' + type : ''}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ── 파일명 자동 분석 ────────────────────────────────────────
   QEMS 표준 파일명 패턴을 분석해서 각 항목을 추출합니다.

   패턴 예시:
     W-GL-Q072000_Ver0_94_공정검사지침서_P2.docx
     W-P-G050000_Ver0_95_문서관리절차서_P2.docx
     W-SOP-C015100_Ver0_97_황삭작업표준서_P2.docx
     W-M-M100000-C_Ver0_95_통합경영매뉴얼관리본_P2.docx

   추출 항목:
     [문서번호] _ [버전앞] _ [버전뒤] _ [문서명] _ [보안등급] .확장자
────────────────────────────────────────────────────────── */
function parseQemsFilename(filename) {
  /* 확장자 제거 */
  const base  = filename.replace(/\.(docx|xlsx|pdf)$/i, '');
  const parts = base.split('_');

  const result = {
    docNumber: '', version: 'Ver 0.90', docName: '',
    secLevel: 2,  docType: '',          seriesId: ''
  };

  if (parts.length < 2) return result;

  /* ══ CFSPS 파일 전용 처리 ══════════════════════════════
     패턴: [CFSPS-X장]_[문서명]_[V버전]_[부버전]
     예 1: CFSPS-1장_개요_V1_32.docx
     예 2: CFSPS-3_0_용어체계_구조_V1_60.docx
     예 3: CFSPS-4장_스마트_건설_바닥시공_개요_V1_31.docx
     QEMS와 달리 문서명이 버전 앞에 위치합니다             */
  if (/^CFSPS/i.test(parts[0])) {

    /* 1. 문서번호: CFSPS-3_0 처럼 두 번째 구간이 숫자이면 합칩니다 */
    let nameStart = 1;
    if (parts.length > 1 && /^\d+$/.test(parts[1])) {
      result.docNumber = `${parts[0]}_${parts[1]}`;
      nameStart = 2;
    } else {
      result.docNumber = parts[0];
      nameStart = 1;
    }

    /* 2. 버전 탐색 — V1·V2·Rev1·Rev2 형태 모두 인식 (대소문자 무관) */
    let verStart = -1;
    for (let i = nameStart; i < parts.length; i++) {
      if (/^V\d+$/i.test(parts[i]) || /^Rev\d+$/i.test(parts[i])) {
        verStart = i;
        break;
      }
    }

    /* 3. 문서명 = 문서번호 다음 ~ 버전 이전 */
    if (verStart > nameStart) {
      result.docName = parts.slice(nameStart, verStart).join(' ');
    } else if (verStart < 0) {
      result.docName = parts.slice(nameStart).join(' ');
    }

    /* 4. 유형·시리즈 고정 + 버전은 EDMS 등록 기준 Rev 1.00 */
    result.docType  = 'CFSPS';
    result.seriesId = 'CFSPS';
    result.version  = 'Rev 1.00';  /* CFSPS는 공식 발행 문서 → EDMS 최초 등록 시 Rev 1.00 */
    return result;
  }

  /* ══ QEMS 파일 처리 ════════════════════════════════════
     패턴: [문서번호]_[Ver버전]_[부버전]_[문서명]_[P등급]
     예: W-GL-Q072000_Ver0_94_공정검사지침서_P2.docx      */

  result.docNumber = parts[0];

  /* 1. 보안등급 — 마지막 구간 P1~P4 */
  const last = parts[parts.length - 1];
  let secIdx = -1;
  if (/^P[1-4]$/i.test(last)) {
    result.secLevel = parseInt(last[1]);
    secIdx = parts.length - 1;
  }

  const searchEnd = secIdx >= 0 ? secIdx : parts.length;

  /* 2. 버전 탐색 — Ver/Rev/Draft */
  let verEnd = -1;
  for (let i = 1; i < searchEnd; i++) {
    const p = parts[i];
    if (/^(Ver|Rev)\d+$/i.test(p)) {
      if (i + 1 < searchEnd && /^\d+$/.test(parts[i + 1])) {
        const prefix = /^Rev/i.test(p) ? 'Rev' : 'Ver';
        const major  = p.replace(/^(Ver|Rev)/i, '');
        result.version = `${prefix} ${major}.${parts[i + 1]}`;
        verEnd = i + 1;
      } else {
        result.version = p;
        verEnd = i;
      }
      break;
    } else if (/^Draft$/i.test(p)) {
      result.version = 'Draft';
      verEnd = i;
      break;
    }
  }

  /* 3. 문서명 — 버전 다음 ~ 보안등급 이전 */
  if (verEnd >= 0) {
    const ns = verEnd + 1;
    const ne = secIdx >= 0 ? secIdx : parts.length;
    result.docName = parts.slice(ns, ne).join(' ');
  }

  /* 4. 문서유형 */
  const dn = result.docNumber.split('-');
  if (dn[0] === 'W' && dn.length >= 2) {
    result.docType = `W-${dn[1]}`;
  }

  /* 5. 시리즈 */
  result.seriesId = inferSeriesId(result.docNumber, result.docType);

  return result;
}

/* 문서번호와 유형으로 시리즈를 추론합니다 (5종 기준) */
function inferSeriesId(docNumber, docType) {
  const dn = (docNumber || '').toUpperCase();
  const dt = (docType  || '').toUpperCase();

  /* 문서번호 기준 */
  if (dn.startsWith('CFSPS'))        return 'CFSPS';
  if (dn.startsWith('CFSP-DS-PLAN')) return 'PLAN';
  if (dn.startsWith('CFSP-NT') || dn.startsWith('NT-')) return 'NT';
  if (dn.startsWith('CES'))          return 'CES';

  /* 문서유형 기준 (문서번호로 못 찾은 경우 보완) */
  if (dt === 'CFSP-DS-PLAN') return 'PLAN';
  if (dt === 'CFSP-NT')      return 'NT';
  if (dt === 'CES')          return 'CES';
  if (dt === 'CFSPS')        return 'CFSPS';

  /* W-xxx 계열 → 모두 QEMS */
  if (dt.startsWith('W-') || dn.startsWith('W-')) return 'QEMS';
  return '';
}

/* 분석 결과를 문서 등록 폼에 자동 입력합니다 */
function applyParsedToRegisterForm(filename) {
  const p = parseQemsFilename(filename);

  /* 각 필드에 값 채우기 */
  const setVal = (id, val) => {
    const el = document.getElementById(id);
    if (el && val) el.value = val;
  };

  setVal('rn',    p.docNumber);
  setVal('rname', p.docName);
  setVal('rver',  p.version);

  /* 보안등급 선택 */
  const secEl = document.getElementById('rsec');
  if (secEl && p.secLevel) secEl.value = String(p.secLevel);

  /* 문서유형 선택 */
  const typeEl = document.getElementById('rtype');
  if (typeEl && p.docType) {
    typeEl.value = p.docType;
  }

  /* 시리즈 선택 — 직접 value 지정 후 실패 시 빈값 유지 */
  const serEl = document.getElementById('rseries');
  if (serEl && p.seriesId) {
    serEl.value = p.seriesId;
    /* 옵션에 없는 값이면 자동으로 '' 로 돌아가므로 별도 처리 불필요 */
  }

  /* 버전에 따라 단계 자동 설정 */
  const stageEl = document.getElementById('rstage');
  if (stageEl) {
    if (/^Draft$/i.test(p.version))       stageEl.value = 'draft';
    else if (/^Rev/i.test(p.version))     stageEl.value = 'released';
    else                                   stageEl.value = 'development';
  }

  /* 자동입력 완료 안내 토스트 */
  toast(`✨ "${filename}" 에서 정보를 자동 입력했습니다. 내용을 확인해 주세요.`, '');
}

/* ── 내비게이션 ─────────────────────────────────────────── */
async function navigate(view, params = {}) {
  S.view   = view;
  S.params = params;
  /* ② 보장: 프로필 미로드 상태 방지 */
  if (!S.profile && S.user) await loadProfile(S.user.id);
  if (view === 'documents') await loadDocuments();
  renderApp();
}

async function gotoDoc(docId) {
  try {
    await loadDocDetail(docId);
    S.view = 'doc_detail';
    renderApp();
  } catch(e) {
    toast('문서 로드 실패: ' + e.message, 'error');

async function filterAndGo(seriesId) {

/* ── 문서 보관 처리 ─────────────────────────────────────── */
async function archiveDoc(docId) {
  if (!confirm('이 문서를 보관 처리하시겠습니까?\n(보관된 문서는 목록에서 기본 숨김됩니다)')) return;
  try {
    await sb.from('documents').update({ status: 'archived' }).eq('id', docId);
    toast('보관 처리 완료', 'success');
    S.filters.status = 'active';
    await loadDocuments();
    navigate('documents');
  } catch(e) {
    toast('처리 실패: ' + e.message, 'error');
  }
}

/* ── 앱 초기화 ──────────────────────────────────────────── */
async function init() {
  /* 기존 세션 확인 */
  const { data: { session } } = await sb.auth.getSession();

  if (!session) {
    renderLogin();
    return;
  }

  S.user = session.user;

  try {
    /* ② 순서 보장:
       1단계 — loadProfile() 완료 (보안등급 확정)
       2단계 — 나머지 데이터 병렬 로드
       3단계 — renderApp() 호출 (이때 S.profile 은 항상 non-null) */
    await loadProfile(S.user.id);
    await Promise.all([ loadStats(), loadSeries(), loadDocuments() ]);
    renderApp();
  } catch(e) {
    console.error('[init] 오류:', e);
    await sb.auth.signOut();
    S.user = null; S.profile = null;
    renderLogin();
    toast('세션 초기화 중 오류가 발생했습니다: ' + e.message, 'error');
  }
}

/* ── Auth 상태 변경 리스너 ─────────────────────────────── */
sb.auth.onAuthStateChange(event => {
  if (event === 'SIGNED_OUT') {
    S.user = null; S.profile = null;
    renderLogin();
  }
});

/* ── 시작 ───────────────────────────────────────────────── */
init();
</script>
</body>
</html>
